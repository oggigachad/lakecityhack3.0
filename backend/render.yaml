services:
  - type: web
    name: verisignal-backend
    env: python
    region: singapore
    plan: free
    rootDir: verisignal/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: verisignal
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: PYTHONPATH
        value: /opt/render/project/src/verisignal

  - type: worker
    name: verisignal-scraper
    env: python
    region: singapore
    plan: free
    rootDir: verisignal/scraper
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: python scheduler.py
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: verisignal
      - key: BACKEND_URL
        sync: false
      - key: PYTHONPATH
        value: /opt/render/project/src/verisignal
